name: Download Sessions & Speakers

on:
  schedule:
    - cron: "0 0 * * *"   # every day at midnight UTC
  workflow_dispatch:        # allow manual runs

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Download sessions and speakers JSON
        run: python download_sessions_speakers.py

      - name: Commit and push updated JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/sessions_all.json public/speakers_all.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update sessions and speakers JSON [skip ci]"
            git push
          fi
